<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة تكريت - نظام تسليم الواجبات HW5</title>
    
    <!-- تحميل المكتبات الأساسية -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- إعداد MathJax للرموز الرياضية -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .card { background: white; border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); border: 1px solid #e5e7eb; }
        .no-select { user-select: none; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .math-box { font-family: serif; font-size: 1.1rem; color: #1e3a8a; background: #f8fafc; padding: 1.5rem; border-radius: 1.5rem; border-right: 8px solid #1e3a8a; direction: ltr; text-align: center; margin: 15px 0; }
        .progress-bar { height: 10px; border-radius: 20px; background: #e5e7eb; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #1e3a8a, #3b82f6); transition: width 0.6s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ضعي رابط Web App URL الخاص بكِ هنا ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby1XwNwqwZ9mF_Kia5ki5hk7kocpeIpMvCMKB2cBf7ZcV5ml9f0rZuRe3O1Gy_7XMawSQ/exec";

        function App() {
            // استعادة الحالة لضمان عدم ضياع البيانات
            const [step, setStep] = useState(() => localStorage.getItem('hw5_fix_step') || 'register');
            const [info, setInfo] = useState(() => JSON.parse(localStorage.getItem('hw5_fix_info')) || { name: '', type: 'صباحي A' });
            const [ans, setAns] = useState(() => JSON.parse(localStorage.getItem('hw5_fix_ans')) || {});
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);
            const [done, setDone] = useState(false);

            // حفظ التقدم تلقائياً
            useEffect(() => {
                localStorage.setItem('hw5_fix_step', step);
                localStorage.setItem('hw5_fix_info', JSON.stringify(info));
                localStorage.setItem('hw5_fix_ans', JSON.stringify(ans));
            }, [step, info, ans]);

            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise();
                }
            }, [step, info.name, done]);

            // الحالات الخمس للسؤال الأول
            const params = useMemo(() => {
                if (!info.name || info.name.trim().length < 5) return { x: 1.5, h: 0.5, x0p: 5, x0n: -5 };
                const seed = info.name.split("").reduce((acc, char) => acc + char.charCodeAt(0), 0);
                const cases = [ {x:0.5,h:0.5}, {x:1,h:0.5}, {x:1,h:1}, {x:1.5,h:0.5}, {x:2,h:1} ];
                const sel = cases[seed % cases.length];
                return { x: sel.x, h: sel.h, x0p: (seed % 5) + 1, x0n: -((seed % 5) + 1) };
            }, [info.name]);

            // محرك التصحيح
            const calculateFinalGrade = () => {
                const f = (x, y) => x*x + y*y;
                const h = params.h;
                const steps = Math.round(params.x / h);
                let ye = 1; for(let i=0; i<steps; i++) ye += h * f(i*h, ye);

                // الجذور الحقيقية (بناءً على تحليل المعادلات في الملف)
                // Q2: x^4-4x^3-7x^2+34x-24 = (x-1)(x-2)(x-4)(x+3) -> Roots: 1, 2, 4, -3
                // Q3: x^4+5x^3-10x^2-80x-96 = (x-4)(x+2)(x+3)(x+4) -> Roots: 4, -2, -3, -4
                const model = {
                    q1: { euler: ye },
                    q2: [1, 2, 4, -3],
                    q3: [4, -2, -3, -4]
                };

                let score = 0;
                const checkGrading = (s, m, max) => {
                    const sv = parseFloat(s || 0);
                    if (Math.trunc(Math.abs(sv)) === Math.trunc(Math.abs(m))) return max; // كاملة
                    if (Math.abs(sv - m) < 1.5) return max * 0.5; // نصف
                    return max * 0.25; // ربع
                };

                // س1 (Euler: 1, Mod: 1, RK: 2)
                score += checkGrading(ans.q1a, model.q1.euler, 1.0);
                score += (ans.q1b ? 1.0 : 0.25);
                score += (ans.q1c ? 2.0 : 0.50);

                // س2 (3 درجات / 4 جذور = 0.75 لكل جذر)
                [ans.q2p, ans.q2n, ans.q2o1, ans.q2o2].forEach(v => {
                    let best = 0.18; // ربع الدرجة لـ 0.75
                    model.q2.forEach(m => {
                        let current = checkGrading(v, m, 0.75);
                        if (current > best) best = current;
                    });
                    score += best;
                });

                // س3 (3 درجات / 4 جذور = 0.75 لكل جذر)
                [ans.q3p, ans.q3n, ans.q3o1, ans.q3o2].forEach(v => {
                    let best = 0.18;
                    model.q3.forEach(m => {
                        let current = checkGrading(v, m, 0.75);
                        if (current > best) best = current;
                    });
                    score += best;
                });

                return { grade: Math.min(score, 10).toFixed(2), model };
            };

            const submit = async () => {
                if(!file && !localStorage.getItem('hw5_fix_done')) return alert("يرجى رفع ملف PDF");
                setLoading(true);
                const results = calculateFinalGrade();
                const payload = { name: info.name, studyType: info.type, grade: results.grade, params, ans, model: results.model, file, time: new Date().toLocaleString('ar-IQ') };
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    localStorage.setItem('hw5_fix_done', 'true');
                    setDone(true);
                } catch (e) { alert("حدث خطأ في الاتصال"); } finally { setLoading(false); }
            };

            const isNextLocked = () => {
                if (step === 'register') return info.name.trim().split(/\s+/).length < 3;
                if (step === 'q1') return !ans.q1a || !ans.q1b || !ans.q1c;
                if (step === 'q2') return !ans.q2p || !ans.q2n || !ans.q2o1 || !ans.q2o2;
                if (step === 'q3') return !ans.q3p || !ans.q3n || !ans.q3o1 || !ans.q3o2;
                return false;
            };

            if (done) return (
                <div className="min-h-screen py-20 px-4 flex flex-col items-center justify-center">
                    <div className="w-full max-w-2xl card p-16 text-center animate-in fade-in duration-1000">
                        <div className="text-9xl mb-8">🎓</div>
                        <h2 className="text-3xl font-black mb-6 text-blue-900 leading-relaxed">تم استلام اجابتك بنجاح يا <br/> <span className="text-blue-700 underline underline-offset-8 decoration-blue-200">{info.name}</span></h2>
                        <p className="text-slate-500 font-bold mb-10">سيتم اعتماد النسخة الأخيرة التي تقوم بإرسالها.</p>
                        <button onClick={() => setDone(false)} className="bg-blue-900 text-white px-12 py-5 rounded-[3rem] font-black shadow-2xl hover:scale-105 transition-all">تعديل الواجب وإعادة الإرسال</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen py-10 px-4 flex flex-col items-center">
                    <div className="w-full max-w-2xl card overflow-hidden border-t-[16px] border-blue-900 transition-all no-select">
                        
                        {step !== 'register' && (
                            <div className="p-6 bg-slate-50 border-b flex flex-col gap-3">
                                <div className="flex justify-between text-[11px] font-black uppercase text-slate-400 tracking-widest">
                                    <span>Progress</span><span>{step === 'q1' ? '25%' : step === 'q2' ? '50%' : step === 'q3' ? '75%' : '100%'}</span>
                                </div>
                                <div className="progress-bar"><div className="progress-fill" style={{ width: step === 'q1' ? '25%' : step === 'q2' ? '50%' : step === 'q3' ? '75%' : '100%' }}></div></div>
                            </div>
                        )}

                        <div className="p-6 bg-white border-b flex justify-between items-center shadow-sm">
                            <div className="text-right">
                                <h1 className="text-xl font-black text-blue-900 leading-none tracking-tight">جامعة تكريت - كلية الهندسة</h1>
                                <p className="text-[10px] font-bold text-slate-400 mt-1 uppercase">Numerical Analysis - HW5</p>
                            </div>
                            <div className="bg-blue-900 text-white px-3 py-1 rounded-xl font-black text-xs italic">2026</div>
                        </div>

                        {step === 'register' && (
                            <div className="p-10 text-right animate-in fade-in duration-500">
                                <h2 className="text-xl font-black mb-8 border-r-8 border-blue-600 pr-3">بيانات الطالب</h2>
                                <input type="text" placeholder="الاسم الثلاثي باللغة العربية" className="w-full p-5 border-2 rounded-[2rem] mb-5 outline-none focus:border-blue-900" onChange={e => setInfo({...info, name: e.target.value})} value={info.name} />
                                <select className="w-full p-5 border-2 rounded-[2rem] mb-10 bg-white font-bold outline-none cursor-pointer" onChange={e => setInfo({...info, type: e.target.value})} value={info.type}>
                                    <option>صباحي A</option><option>صباحي B</option><option>صباحي C</option><option>فصلي</option><option>مسائي</option>
                                </select>
                                <button onClick={() => !isNextLocked() && setStep('q1')} disabled={isNextLocked()} className="w-full bg-blue-900 text-white font-black py-6 rounded-[2.5rem] shadow-xl disabled:opacity-20 text-xl transition-all">دخول للواجب</button>
                            </div>
                        )}

                        {step === 'q1' && (
                            <div className="p-8 text-right animate-in slide-in-from-left">
                                <h3 className="font-black text-blue-900 mb-6 border-b pb-2 flex justify-between"><span>السؤال الأول</span><span className="text-slate-400 text-xs">1 / 3</span></h3>
                                <div className="math-box">
                                    Q1: If {"\\( (\\frac{dy}{dx}=x^{2}+y^{2}) \\)"} and {"\\( [y(0)=1] \\)"} find (y) at:
                                    <div className="flex justify-center gap-4 mt-6">
                                        <div className="bg-white px-5 py-2 rounded-2xl border-2 border-blue-100 font-black text-blue-900">x = {params.x}</div>
                                        <div className="bg-white px-5 py-2 rounded-2xl border-2 border-blue-100 font-black text-blue-900">h = {params.h}</div>
                                    </div>
                                </div>
                                <div className="space-y-4" dir="ltr">
                                    <input type="number" step="any" placeholder="a- Euler Method Result" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, q1a: e.target.value})} value={ans.q1a||''} />
                                    <input type="number" step="any" placeholder="b- Modified Euler Result" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, q1b: e.target.value})} value={ans.q1b||''} />
                                    <input type="number" step="any" placeholder="c- Runge-Kutta Result" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, q1c: e.target.value})} value={ans.q1c||''} />
                                </div>
                                <button onClick={() => !isNextLocked() && setStep('q2')} disabled={isNextLocked()} className="w-full mt-10 bg-blue-900 text-white py-4 rounded-3xl font-black shadow-lg disabled:opacity-20 transition-all">السؤال التالي</button>
                            </div>
                        )}

                        {step === 'q2' && (
                            <div className="p-8 text-right animate-in slide-in-from-left">
                                <h3 className="font-black text-blue-900 mb-6 border-b pb-2 flex justify-between"><span>السؤال الثاني</span><span className="text-slate-400 text-xs">2 / 3</span></h3>
                                <div className="math-box text-right text-[1rem] leading-relaxed" dir="rtl">
                                    Q2: The following equation has three positive roots and one negative root:
                                    <div className="my-4 font-serif text-2xl text-center direction-ltr">{"\\[ x^{4}-4x^{3}-7x^{2}+34x-24=0 \\]"}</div>
                                    Approximate one positive root and the negative root by starting {"\\( x^{\\circ}=" + params.x0p + " \\)"} and {"\\( x^{\\circ}=" + params.x0n + " \\)"} respectively, using Newton-Raphson. Then find the other two positive roots.
                                </div>
                                <div className="grid grid-cols-2 gap-4 mt-6" dir="ltr">
                                    <input type="number" step="any" placeholder="Positive Root (NR)" className="w-full p-4 border-2 rounded-2xl text-center font-mono" onChange={e => setAns({...ans, q2p: e.target.value})} value={ans.q2p||''} />
                                    <input type="number" step="any" placeholder="Negative Root (NR)" className="w-full p-4 border-2 rounded-2xl text-center font-mono" onChange={e => setAns({...ans, q2n: e.target.value})} value={ans.q2n||''} />
                                    <input type="number" step="any" placeholder="Other Root (1)" className="w-full p-4 border-2 rounded-2xl text-center font-mono" onChange={e => setAns({...ans, q2o1: e.target.value})} value={ans.q2o1||''} />
                                    <input type="number" step="any" placeholder="Other Root (2)" className="w-full p-4 border-2 rounded-2xl text-center font-mono" onChange={e => setAns({...ans, q2o2: e.target.value})} value={ans.q2o2||''} />
                                </div>
                                <div className="flex gap-4 mt-12">
                                    <button onClick={() => setStep('q1')} className="flex-1 bg-slate-100 py-4 rounded-3xl font-bold text-slate-400">Back</button>
                                    <button onClick={() => !isNextLocked() && setStep('q3')} disabled={isNextLocked()} className="flex-[2] bg-blue-900 text-white py-4 rounded-3xl font-black shadow-lg disabled:opacity-20 transition-all">السؤال التالي</button>
                                </div>
                            </div>
                        )}

                        {step === 'q3' && (
                            <div className="p-8 text-right animate-in slide-in-from-left">
                                <h3 className="font-black text-blue-900 mb-6 border-b pb-2 flex justify-between"><span>السؤال الثالث</span><span className="text-slate-400 text-xs">3 / 3</span></h3>
                                <div className="math-box text-right text-[1rem] leading-relaxed" dir="rtl">
                                    Q3: The following equation has three negative roots and one positive root:
                                    <div className="my-4 font-serif text-2xl text-center direction-ltr">{"\\[ x^{4}+5x^{3}-10x^{2}-80x-96=0 \\]"}</div>
                                    Approximate one positive root and the negative root by starting {"\\( x^{\\circ}=" + params.x0p + " \\)"} and {"\\( x^{\\circ}=" + params.x0n + " \\)"} respectively, using Newton-Raphson. Then find the other two negative roots.
                                </div>
                                <div className="grid grid-cols-2 gap-4 mt-6" dir="ltr">
                                    <input type="number" step="any" placeholder="Positive Root (NR)" className="w-full p-4 border-2 rounded-2xl text-center font-mono" onChange={e => setAns({...ans, q3p: e.target.value})} value={ans.q3p||''} />
                                    <input type="number" step="any" placeholder="Negative Root (NR)" className="w-full p-4 border-2 rounded-2xl text-center font-mono" onChange={e => setAns({...ans, q3n: e.target.value})} value={ans.q3n||''} />
                                    <input type="number" step="any" placeholder="Other Negative (1)" className="w-full p-4 border-2 rounded-2xl text-center font-mono" onChange={e => setAns({...ans, q3o1: e.target.value})} value={ans.q3o1||''} />
                                    <input type="number" step="any" placeholder="Other Negative (2)" className="w-full p-4 border-2 rounded-2xl text-center font-mono" onChange={e => setAns({...ans, q3o2: e.target.value})} value={ans.q3o2||''} />
                                </div>
                                <div className="flex gap-4 mt-12">
                                    <button onClick={() => setStep('q2')} className="flex-1 bg-slate-100 py-4 rounded-3xl font-bold text-slate-400">Back</button>
                                    <button onClick={() => !isNextLocked() && setStep('upload')} disabled={isNextLocked()} className="flex-[2] bg-blue-900 text-white py-4 rounded-3xl font-black shadow-lg disabled:opacity-20 transition-all">الرفع والنهائي</button>
                                </div>
                            </div>
                        )}

                        {step === 'upload' && (
                            <div className="p-10 text-center animate-in zoom-in duration-500">
                                <h3 className="text-xl font-black mb-10 text-blue-900 underline decoration-blue-100 italic">ارفق ملف الحل الكامل (PDF)</h3>
                                <div className="border-4 border-dashed p-14 rounded-[4rem] bg-slate-50 mb-10 border-blue-50 flex flex-col items-center cursor-pointer">
                                    <input type="file" accept="application/pdf" id="f_pdf" className="hidden" onChange={e => {
                                        const file = e.target.files[0];
                                        if(file && file.size <= 8*1024*1024) {
                                            const r = new FileReader(); r.onload = () => setFile(r.result.split(',')[1]); r.readAsDataURL(file);
                                        }
                                    }} />
                                    <label htmlFor="f_pdf" className="cursor-pointer">
                                        <div className="text-8xl mb-4 transition-transform hover:scale-110">📄</div>
                                        <p className="font-black text-slate-600 mb-2">{file ? "✅ تم اختيار ملف الحل بنجاح" : "اضغط لاختيار ملف PDF"}</p>
                                    </label>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setStep('q3')} className="flex-1 bg-slate-100 py-5 rounded-[2rem] font-black text-slate-400">رجوع</button>
                                    <button onClick={submit} disabled={loading || (!file && !localStorage.getItem('hw5_fix_done'))} className="flex-[2] bg-green-600 text-white py-5 rounded-[2rem] font-black text-2xl shadow-xl disabled:opacity-30 active:scale-95 transition-all">
                                        {loading ? "جاري الإرسال..." : "تأكيد الإرسال والنهائي"}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
