<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة تكريت - واجب HW5</title>
    
    <!-- مكتبات React و Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- مكتبة الرياضيات MathJax -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .math-box { font-family: serif; background: #f1f5f9; padding: 1.5rem; border-radius: 1.2rem; border-right: 6px solid #1e3a8a; direction: ltr; margin: 15px 0; }
        .progress-bar { height: 8px; border-radius: 10px; background: #e2e8f0; overflow: hidden; }
        .progress-fill { height: 100%; background: #1e3a8a; transition: width 0.5s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // تعريف الثوابت لـ React (بدلاً من import)
        const { useState, useEffect, useMemo } = React;

        // --- ضعي رابط Web App URL الخاص بكِ هنا ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyc6_zL7-O4uaSO7u1LNtwaDRvm_qaleaM0oDVSmmRlWAIbpH3tHfVOqBrmiUIfvAYo/exec";

        function App() {
            const [step, setStep] = useState('register');
            const [studentInfo, setStudentInfo] = useState({ name: '', studyType: 'صباحي A' });
            const [ans, setAns] = useState({});
            const [fullFile, setFullFile] = useState(null);
            const [loading, setLoading] = useState(false);

            // تحديث المعادلات عند تغيير الصفحة
            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise();
                }
            }, [step, studentInfo.name]);

            // توليد الحالات العشر للسؤال الأول بناءً على الاسم
            const params = useMemo(() => {
                if (!studentInfo.name || studentInfo.name.length < 5) return { x: 1.5, h: 0.5, x0_p: 5, x0_n: -5 };
                const seed = studentInfo.name.split("").reduce((a, b) => a + b.charCodeAt(0), 0);
                
                const q1_cases = [
                    {x: 0.5, h: 0.5}, {x: 1, h: 0.5}, {x: 1, h: 1}, 
                    {x: 1.5, h: 0.5}, {x: 1.5, h: 0.5}, {x: 2, h: 1}, 
                    {x: 2.5, h: 1.5}, {x: 3, h: 1}, {x: 4, h: 1}, {x: 4, h: 2}
                ];
                const selected = q1_cases[seed % q1_cases.length];
                return { x: selected.x, h: selected.h, x0_p: (seed % 5) + 1, x0_n: -((seed % 5) + 1) };
            }, [studentInfo.name]);

            // محرك التصحيح (Euler & Newton Raphson)
            const solveModel = () => {
                const f = (x, y) => x*x + y*y;
                const h = params.h;
                const steps = Math.round(params.x / h);
                let ye = 1; for(let i=0; i<steps; i++) ye += h * f(i*h, ye);

                const solveNR = (type, start) => {
                    let x = start;
                    const f2 = (x) => Math.pow(x,4)-4*Math.pow(x,3)-7*x*x+34*x-24;
                    const df2 = (x) => 4*Math.pow(x,3)-12*x*x-14*x+34;
                    const f3 = (x) => Math.pow(x,4)+5*Math.pow(x,3)-10*x*x-80*x-96;
                    const df3 = (x) => 4*Math.pow(x,3)+15*x*x-20*x-80;
                    const func = (type===2)?f2:f3; const dfunc = (type===2)?df2:df3;
                    for(let i=0; i<15; i++) x = x - func(x)/dfunc(x);
                    return x;
                };

                return {
                    q1: { euler: ye },
                    q2: { p: solveNR(2, params.x0_p), n: solveNR(2, params.x0_n) },
                    q3: { p: solveNR(3, params.x0_p), n: solveNR(3, params.x0_n) }
                };
            };

            const calculateGrade = () => {
                const model = solveModel();
                let score = 0;
                const check = (s, m) => Math.trunc(Math.abs(parseFloat(s||0))) === Math.trunc(Math.abs(m));

                if (check(ans.q1a, model.q1.euler)) score += 1;
                if (ans.q1b) score += 1; 
                if (ans.q1c) score += 2; 

                if (check(ans.q2p, model.q2.p)) score += 1.5;
                if (check(ans.q2n, model.q2.n)) score += 1.5;

                if (check(ans.q3p, model.q3.p)) score += 1.5;
                if (check(ans.q3n, model.q3.n)) score += 1.5;

                return { grade: Math.min(score, 10).toFixed(2), model };
            };

            const submit = async () => {
                if(!fullFile) return alert("يرجى رفع ملف الحل أولاً");
                setLoading(true);
                const { grade, model } = calculateGrade();
                const payload = { name: studentInfo.name, studyType: studentInfo.studyType, grade, params, ans, modelAnswers: model, fullFile, time: new Date().toLocaleString('ar-IQ') };
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setStep('success');
                } catch (e) { alert("حدث خطأ في الاتصال"); } finally { setLoading(false); }
            };

            const progress = () => {
                const map = { register: 0, q1: 25, q2: 50, q3: 75, upload: 100 };
                return map[step] || 0;
            };

            return (
                <div className="min-h-screen py-10 px-4 flex flex-col items-center">
                    <div className="w-full max-w-2xl card overflow-hidden border-t-[16px] border-blue-900 transition-all">
                        
                        {step !== 'register' && step !== 'success' && (
                            <div className="progress-bar w-full h-2"><div className="progress-fill shadow-lg" style={{ width: `${progress()}%` }}></div></div>
                        )}

                        <div className="p-6 bg-slate-50 border-b flex justify-between items-center">
                            <div className="text-right">
                                <h1 className="text-xl font-black text-blue-900">جامعة تكريت - هندسة مدنية</h1>
                                <p className="text-[10px] font-bold text-slate-500 uppercase">Numerical Analysis HW5</p>
                            </div>
                            <div className="bg-blue-900 text-white px-3 py-1 rounded-xl font-black text-xs">2026</div>
                        </div>

                        {step === 'register' && (
                            <div className="p-10 text-right">
                                <h2 className="text-xl font-black mb-8 border-r-8 border-blue-600 pr-3">بيانات الطالب</h2>
                                <input type="text" placeholder="الاسم الثلاثي باللغة العربية" className="w-full p-4 border-2 rounded-3xl mb-4 outline-none focus:border-blue-900 shadow-sm" onChange={e => setStudentInfo({...studentInfo, name: e.target.value})} />
                                <select className="w-full p-4 border-2 rounded-3xl mb-10 bg-white font-bold outline-none" onChange={e => setStudentInfo({...studentInfo, studyType: e.target.value})}>
                                    <option>صباحي A</option><option>صباحي B</option><option>صباحي C</option><option>فصلي</option><option>مسائي</option>
                                </select>
                                <button onClick={() => studentInfo.name.length > 5 ? setStep('q1') : alert("يرجى إدخال اسمك")} className="w-full bg-blue-900 text-white font-black py-5 rounded-3xl shadow-xl hover:bg-blue-800 text-xl">دخول للواجب</button>
                            </div>
                        )}

                        {step === 'q1' && (
                            <div className="p-8 text-right">
                                <h3 className="font-black text-blue-900 mb-6 border-b pb-2 flex justify-between"><span>السؤال الأول</span><span className="text-slate-400 text-xs tracking-widest">1 / 3</span></h3>
                                <div className="math-box text-sm">
                                    Q1: If {"\\( (\\frac{dy}{dx}=x^{2}+y^{2}) \\)"} and {"\\( [y(0)=1] \\)"} find (y) at {"\\( [x=" + params.x + "] \\)"} and {"\\( [h=" + params.h + "] \\)"}, by using:
                                </div>
                                <div className="space-y-4" dir="ltr">
                                    <input type="number" step="any" placeholder="a- Euler Method Result" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, q1a: e.target.value})} value={ans.q1a||''} />
                                    <input type="number" step="any" placeholder="b- Modified Euler Result" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, q1b: e.target.value})} value={ans.q1b||''} />
                                    <input type="number" step="any" placeholder="c- Runge-Kutta Result" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, q1c: e.target.value})} value={ans.q1c||''} />
                                </div>
                                <button onClick={() => (ans.q1a && ans.q1b && ans.q1c) ? setStep('q2') : alert("املأ جميع الخانات")} className="w-full mt-10 bg-blue-900 text-white py-4 rounded-3xl font-black shadow-lg">التالي</button>
                            </div>
                        )}

                        {step === 'q2' && (
                            <div className="p-8 text-right">
                                <h3 className="font-black text-blue-900 mb-6 border-b pb-2 flex justify-between"><span>السؤال الثاني</span><span className="text-slate-400 text-xs tracking-widest">2 / 3</span></h3>
                                <div className="math-box text-xs">
                                    Q2: {"\\( x^{4}-4x^{3}-7x^{2}+34x-24=0 \\)"}. Approximate one positive and one negative root starting with {"\\( x^{\\circ}=" + params.x0_p + " \\)"} and {"\\( x^{\\circ}=" + params.x0_n + " \\)"} using Newton-Raphson.
                                </div>
                                <div className="grid grid-cols-2 gap-4" dir="ltr">
                                    <input type="number" step="any" placeholder="Positive Root" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, q2p: e.target.value})} value={ans.q2p||''} />
                                    <input type="number" step="any" placeholder="Negative Root" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, q2n: e.target.value})} value={ans.q2n||''} />
                                </div>
                                <button onClick={() => (ans.q2p && ans.q2n) ? setStep('q3') : alert("املأ جميع الخانات")} className="w-full mt-10 bg-blue-900 text-white py-4 rounded-3xl font-black shadow-lg">التالي</button>
                            </div>
                        )}

                        {step === 'q3' && (
                            <div className="p-8 text-right">
                                <h3 className="font-black text-blue-900 mb-6 border-b pb-2 flex justify-between"><span>السؤال الثالث</span><span className="text-slate-400 text-xs tracking-widest">3 / 3</span></h3>
                                <div className="math-box text-xs">
                                    Q3: {"\\( x^{4}+5x^{3}-10x^{2}-80x-96=0 \\)"}. Approximate one positive and one negative root starting with {"\\( x^{\\circ}=" + params.x0_p + " \\)"} and {"\\( x^{\\circ}=" + params.x0_n + " \\)"} using Newton-Raphson.
                                </div>
                                <div className="grid grid-cols-2 gap-4" dir="ltr">
                                    <input type="number" step="any" placeholder="Positive Root" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, q3p: e.target.value})} value={ans.q3p||''} />
                                    <input type="number" step="any" placeholder="Negative Root" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, q3n: e.target.value})} value={ans.q3n||''} />
                                </div>
                                <button onClick={() => (ans.q3p && ans.q3n) ? setStep('upload') : alert("املأ جميع الخانات")} className="w-full mt-10 bg-blue-900 text-white py-4 rounded-3xl font-black shadow-lg">للرفع</button>
                            </div>
                        )}

                        {step === 'upload' && (
                            <div className="p-10 text-center animate-in zoom-in">
                                <h3 className="text-xl font-black mb-10 text-blue-900 italic">ارفق ملف الحل الكامل (PDF)</h3>
                                <div className="border-4 border-dashed p-14 rounded-[3.5rem] bg-slate-50 mb-10 border-blue-50 flex flex-col items-center">
                                    <input type="file" accept="application/pdf" id="f" className="hidden" onChange={e => {
                                        const file = e.target.files[0];
                                        const reader = new FileReader();
                                        reader.onload = () => setFullFile(reader.result.split(',')[1]);
                                        reader.readAsDataURL(file);
                                    }} />
                                    <label htmlFor="f" className="cursor-pointer">
                                        <div className="text-7xl mb-4 group-hover:scale-110 transition-transform">📄</div>
                                        <p className="font-black text-slate-600 mb-2">{fullFile ? "✅ تم اختيار الحل" : "اضغط لاختيار ملف PDF"}</p>
                                    </label>
                                </div>
                                <button onClick={submit} disabled={loading || !fullFile} className="w-full bg-green-600 text-white py-5 rounded-3xl font-black text-2xl shadow-xl disabled:opacity-30">
                                    {loading ? "جاري الإرسال..." : "تأكيد التسليم النهائي"}
                                </button>
                            </div>
                        )}

                        {step === 'success' && (
                            <div className="p-20 text-center bg-white shadow-inner">
                                <div className="text-8xl mb-8 animate-bounce">🎓</div>
                                <h2 className="text-2xl font-black mb-10 text-blue-900 leading-loose">
                                    لقد تم استلام اجابتك بنجاح يا <br/>
                                    <span className="text-blue-700 underline underline-offset-8 decoration-2">{studentInfo.name}</span> <br/>
                                    شكراً لك على المشاركة
                                </h2>
                                <div className="p-5 border-4 border-double border-blue-900 rounded-[2.5rem] text-blue-900 font-black text-sm inline-block">جامعة تكريت - قسم الهندسة المدنية</div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
