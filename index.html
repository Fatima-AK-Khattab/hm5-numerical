<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة تكريت - واجب التحليلات العددية HW5</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7fa; }
        .main-card { background: white; border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; }
        .no-select { user-select: none; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .math-display-box { font-family: serif; font-size: 1.15rem; color: #1e3a8a; background: #f8fafc; padding: 1.5rem; border-radius: 1.5rem; border-right: 8px solid #1e3a8a; direction: ltr; text-align: center; margin: 15px 0; }
        .progress-bar-container { height: 10px; border-radius: 20px; background: #e5e7eb; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #1e3a8a, #3b82f6); transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ضعي رابط Web App URL الخاص بكِ هنا ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby1XwNwqwZ9mF_Kia5ki5hk7kocpeIpMvCMKB2cBf7ZcV5ml9f0rZuRe3O1Gy_7XMawSQ/exec";

        function App() {
            // محرك استعادة البيانات لضمان عدم ضياع الحل عند التحديث
            const [step, setStep] = useState(() => localStorage.getItem('hw5_v3_step') || 'register');
            const [studentInfo, setStudentInfo] = useState(() => JSON.parse(localStorage.getItem('hw5_v3_info')) || { name: '', studyType: 'صباحي A' });
            const [ans, setAns] = useState(() => JSON.parse(localStorage.getItem('hw5_v3_ans')) || {});
            const [fullFile, setFullFile] = useState(null);
            const [loading, setLoading] = useState(false);
            const [isSuccess, setIsSuccess] = useState(false);

            // حفظ كل خطوة يقوم بها الطالب تلقائياً
            useEffect(() => {
                localStorage.setItem('hw5_v3_step', step);
                localStorage.setItem('hw5_v3_info', JSON.stringify(studentInfo));
                localStorage.setItem('hw5_v3_ans', JSON.stringify(ans));
            }, [step, studentInfo, ans]);

            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise();
                }
            }, [step, studentInfo.name, isSuccess]);

            // مصفوفة الحالات الخمس المحددة للسؤال الأول بناءً على الاسم
            const params = useMemo(() => {
                if (!studentInfo.name || studentInfo.name.trim().length < 5) return { x: 1.5, h: 0.5, x0_pos: 5, x0_neg: -5 };
                const fingerprint = studentInfo.name.replace(/\s+/g, "");
                const seed = fingerprint.split("").reduce((acc, char) => acc + char.charCodeAt(0), 0);
                
                const q1_cases = [
                    {x: 0.5, h: 0.5}, {x: 1, h: 0.5}, {x: 1, h: 1}, 
                    {x: 1.5, h: 0.5}, {x: 2, h: 1}
                ];
                const selected = q1_cases[seed % q1_cases.length];
                const x0_p = (seed % 5) + 1; // x0 بين 1 و 5
                const x0_n = -((seed % 5) + 1); // x0 بين -1 و -5

                return { x: selected.x, h: selected.h, x0_pos: x0_p, x0_neg: x0_n };
            }, [studentInfo.name]);

            // محرك التصحيح الرياضي الداخلي (ODE + Newton Raphson)
            const calculateResults = () => {
                const f = (x, y) => x*x + y*y;
                const h = params.h;
                const steps = Math.round(params.x / h);
                
                // Q1 Calculations
                let ye = 1; for(let i=0; i<steps; i++) ye += h * f(i*h, ye);
                let ym = 1; for(let i=0; i<steps; i++) {
                    let k1 = f(i*h, ym); ym += (h/2) * (k1 + f((i+1)*h, ym + h*k1));
                }
                let yr = 1; for(let i=0; i<steps; i++) {
                    let cx = i*h, k1 = h*f(cx,yr), k2 = h*f(cx+h/2,yr+k1/2), k3 = h*f(cx+h/2,yr+k2/2), k4 = h*f(cx+h,yr+k3);
                    yr += (k1 + 2*k2 + 2*k3 + k4)/6;
                }

                // Roots of Q2: (x-1)(x-2)(x-4)(x+3) = 0 -> 1, 2, 4, -3
                // Roots of Q3: (x-4)(x+2)(x+3)(x+4) = 0 -> 4, -2, -3, -4
                const model = {
                    q1: { euler: ye, mod: ym, rk: yr },
                    q2: { roots: [1, 2, 4, -3], p: 4, n: -3 }, // Simplified for integer part check
                    q3: { roots: [4, -2, -3, -4], p: 4, n: -2 }
                };

                let score = 0;
                const checkGrading = (sVal, mVal, max) => {
                    const s = parseFloat(sVal || 0);
                    const m = parseFloat(mVal);
                    if (Math.trunc(Math.abs(s)) === Math.trunc(Math.abs(m))) return max;
                    if (Math.abs(s - m) < 2) return max * 0.5;
                    return max * 0.25;
                };

                // Q1: 4 pts
                score += checkGrading(ans.q1a, model.q1.euler, 1.0);
                score += checkGrading(ans.q1b, model.q1.mod, 1.0);
                score += checkGrading(ans.q1c, model.q1.rk, 2.0);

                // Q2: 3 pts (4 roots x 0.75)
                const q2Inputs = [ans.q2p, ans.q2n, ans.q2o1, ans.q2o2];
                q2Inputs.forEach(val => {
                    let bestMatch = 0;
                    model.q2.roots.forEach(r => {
                        let currentScore = checkGrading(val, r, 0.75);
                        if(currentScore > bestMatch) bestMatch = currentScore;
                    });
                    score += bestMatch;
                });

                // Q3: 3 pts (4 roots x 0.75)
                const q3Inputs = [ans.q3p, ans.q3n, ans.q3o1, ans.q3o2];
                q3Inputs.forEach(val => {
                    let bestMatch = 0;
                    model.q3.roots.forEach(r => {
                        let currentScore = checkGrading(val, r, 0.75);
                        if(currentScore > bestMatch) bestMatch = currentScore;
                    });
                    score += bestMatch;
                });

                return { grade: Math.min(score, 10).toFixed(2), modelAnswers: model };
            };

            const submit = async () => {
                if(!fullFile && !localStorage.getItem('hw5_v3_submitted')) return alert("يرجى رفع ملف الحل أولاً");
                setLoading(true);
                const { grade, modelAnswers } = calculateResults();
                const payload = { 
                    name: studentInfo.name, studyType: studentInfo.studyType, grade, params, ans, 
                    modelAnswers, fullFile, time: new Date().toLocaleString('ar-IQ') 
                };
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    localStorage.setItem('hw5_v3_submitted', 'true');
                    setIsSuccess(true);
                } catch (e) { alert("خطأ في الاتصال، حاول مجدداً"); } finally { setLoading(false); }
            };

            const isLocked = () => {
                if(step === 'register') return studentInfo.name.trim().split(/\s+/).length < 3;
                if(step === 'q1') return !ans.q1a || !ans.q1b || !ans.q1c;
                if(step === 'q2') return !ans.q2p || !ans.q2n || !ans.q2o1 || !ans.q2o2;
                if(step === 'q3') return !ans.q3p || !ans.q3n || !ans.q3o1 || !ans.q3o2;
                return false;
            };

            const progress = () => {
                const map = { register: 0, q1: 25, q2: 50, q3: 75, upload: 100 };
                return map[step] || 0;
            };

            if (isSuccess) return (
                <div className="min-h-screen py-10 px-4 flex flex-col items-center justify-center">
                    <div className="w-full max-w-2xl main-card p-16 text-center animate-in fade-in duration-1000">
                        <div className="text-9xl mb-8">🎓</div>
                        <h2 className="text-3xl font-black mb-6 text-blue-900 leading-relaxed">
                            لقد تم استلام اجابتك بنجاح يا <br/>
                            <span className="text-blue-700 underline underline-offset-8 decoration-blue-200">{studentInfo.name}</span>
                        </h2>
                        <p className="text-slate-500 font-bold mb-12">سيتم اعتماد آخر نسخة تقوم بإرسالها في التصحيح النهائي.</p>
                        <button onClick={() => setIsSuccess(false)} className="bg-blue-900 text-white px-12 py-5 rounded-[3rem] font-black shadow-2xl hover:scale-105 transition-all active:scale-95">تعديل الواجب وإعادة الإرسال</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen py-10 px-4 flex flex-col items-center">
                    <div className="w-full max-w-2xl main-card overflow-hidden border-t-[16px] border-blue-900 transition-all no-select">
                        
                        {step !== 'register' && (
                            <div className="p-6 bg-slate-50 border-b flex flex-col gap-3">
                                <div className="flex justify-between items-center text-[11px] font-black uppercase text-slate-400 tracking-widest">
                                    <span>Task Progress</span><span>{progress()}%</span>
                                </div>
                                <div className="progress-bar-container"><div className="progress-bar-fill" style={{ width: `${progress()}%` }}></div></div>
                            </div>
                        )}

                        <div className="p-6 bg-white border-b flex justify-between items-center shadow-sm">
                            <div className="text-right">
                                <h1 className="text-xl font-black text-blue-900 leading-none">جامعة تكريت - كلية الهندسة</h1>
                                <p className="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-tighter">Numerical Analysis - HW5</p>
                            </div>
                            <div className="bg-blue-900 text-white px-3 py-1 rounded-xl font-black text-xs uppercase">2026</div>
                        </div>

                        {step === 'register' && (
                            <div className="p-10 text-right animate-in fade-in duration-500">
                                <h2 className="text-xl font-black mb-8 border-r-8 border-blue-600 pr-3">بيانات الطالب</h2>
                                <div className="space-y-6">
                                    <input type="text" placeholder="الاسم الثلاثي باللغة العربية" className="w-full p-5 border-2 rounded-[2rem] mb-4 outline-none focus:border-blue-900 shadow-sm" onChange={e => setStudentInfo({...studentInfo, name: e.target.value})} value={studentInfo.name} />
                                    <select className="w-full p-5 border-2 rounded-[2rem] mb-10 bg-white font-bold outline-none cursor-pointer shadow-sm" onChange={e => setStudentInfo({...studentInfo, studyType: e.target.value})} value={studentInfo.studyType}>
                                        <option>صباحي A</option><option>صباحي B</option><option>صباحي C</option><option>فصلي</option><option>مسائي</option>
                                    </select>
                                </div>
                                <button onClick={() => !isLocked() && setStep('q1')} disabled={isLocked()} className="w-full bg-blue-900 text-white font-black py-6 rounded-[2.5rem] shadow-xl disabled:opacity-10 hover:bg-blue-800 text-xl transition-all">دخول للواجب</button>
                            </div>
                        )}

                        {step === 'q1' && (
                            <div className="p-8 text-right animate-in slide-in-from-left duration-500">
                                <h3 className="font-black text-blue-900 mb-6 border-b pb-2 flex justify-between"><span>السؤال الأول</span><span className="text-slate-400 text-xs">1 / 3</span></h3>
                                <div className="math-display-box">
                                    Q1: If {"\\( (\\frac{dy}{dx}=x^{2}+y^{2}) \\)"} and {"\\( [y(0)=1] \\)"} find (y) at:
                                    <div className="flex justify-center gap-6 mt-6 font-black text-2xl">
                                        <div className="bg-white px-6 py-2 rounded-2xl border-2 border-blue-100 text-blue-900 shadow-sm">x = {params.x}</div>
                                        <div className="bg-white px-6 py-2 rounded-2xl border-2 border-blue-100 text-blue-900 shadow-sm">h = {params.h}</div>
                                    </div>
                                    <div className="mt-4 text-xs font-bold text-slate-400 italic">using: Euler, Modified Euler, and Runge-Kutta.</div>
                                </div>
                                <div className="space-y-4" dir="ltr">
                                    {[['q1a', 'a- Euler Method (1.0)'], ['q1b', 'b- Modified Euler (1.0)'], ['q1c', 'c- Runge-Kutta (2.0)']].map(([k, t]) => (
                                        <div key={k}><label className="text-[10px] font-black text-slate-400 mb-1 ml-3 uppercase">{t}</label>
                                        <input type="number" step="any" placeholder="Final result..." className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900 shadow-sm outline-none" onChange={e => setAns({...ans, [k]: e.target.value})} value={ans[k]||''} /></div>
                                    ))}
                                </div>
                                <div className="flex gap-4 mt-12">
                                    <button onClick={() => setStep('register')} className="flex-1 bg-slate-100 py-4 rounded-3xl font-bold text-slate-400">Back</button>
                                    <button onClick={() => !isLocked() && setStep('q2')} disabled={isLocked()} className="flex-[2] bg-blue-900 text-white py-4 rounded-3xl font-black shadow-lg disabled:opacity-20 transition-all">Next</button>
                                </div>
                            </div>
                        )}

                        {step === 'q2' && (
                            <div className="p-8 text-right animate-in slide-in-from-left duration-500">
                                <h3 className="font-black text-blue-900 mb-6 border-b pb-2 flex justify-between"><span>السؤال الثاني</span><span className="text-slate-400 text-xs">2 / 3</span></h3>
                                <div className="math-display-box text-[1rem] leading-relaxed text-right" dir="rtl">
                                    Q2: The following equation has three positive roots and one negative root: 
                                    <div className="my-4 font-serif text-2xl text-center direction-ltr">{"\\[ x^{4}-4x^{3}-7x^{2}+34x-24=0 \\]"}</div>
                                    Approximate one positive root and the negative root by starting <span className="direction-ltr inline-block">{"\\( x^{\\circ}=" + params.x0_pos + " \\)"}</span> and <span className="direction-ltr inline-block">{"\\( x^{\\circ}=" + params.x0_neg + " \\)"}</span> respectively, using the Newton-Raphson method. Perform at least five iterations for each of the roots. Then find the other two positive roots.
                                </div>
                                <div className="grid grid-cols-2 gap-4 mt-8" dir="ltr">
                                    <div><label className="text-[10px] font-black text-slate-400 block text-center mb-1">One Positive Root (NR)</label>
                                    <input type="number" step="any" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900 shadow-sm outline-none" onChange={e => setAns({...ans, q2p: e.target.value})} value={ans.q2p||''} /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 block text-center mb-1">Negative Root (NR)</label>
                                    <input type="number" step="any" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900 shadow-sm outline-none" onChange={e => setAns({...ans, q2n: e.target.value})} value={ans.q2n||''} /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 block text-center mb-1">Other Positive Root (1)</label>
                                    <input type="number" step="any" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900 shadow-sm outline-none" onChange={e => setAns({...ans, q2o1: e.target.value})} value={ans.q2o1||''} /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 block text-center mb-1">Other Positive Root (2)</label>
                                    <input type="number" step="any" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900 shadow-sm outline-none" onChange={e => setAns({...ans, q2o2: e.target.value})} value={ans.q2o2||''} /></div>
                                </div>
                                <div className="flex gap-4 mt-12">
                                    <button onClick={() => setStep('q1')} className="flex-1 bg-slate-100 py-4 rounded-3xl font-bold text-slate-400">Back</button>
                                    <button onClick={() => !isNextLocked() && setStep('q3')} disabled={isNextLocked()} className="flex-[2] bg-blue-900 text-white py-4 rounded-3xl font-black shadow-lg disabled:opacity-20 transition-all">Next</button>
                                </div>
                            </div>
                        )}

                        {step === 'q3' && (
                            <div className="p-8 text-right animate-in slide-in-from-left duration-500">
                                <h3 className="font-black text-blue-900 mb-6 border-b pb-2 flex justify-between"><span>السؤال الثالث</span><span className="text-slate-400 text-xs">3 / 3</span></h3>
                                <div className="math-display-box text-[1rem] leading-relaxed text-right" dir="rtl">
                                    Q3: The following equation has three negative roots and one positive root: 
                                    <div className="my-4 font-serif text-2xl text-center direction-ltr">{"\\[ x^{4}+5x^{3}-10x^{2}-80x-96=0 \\]"}</div>
                                    Approximate one positive root and the negative root by starting <span className="direction-ltr inline-block">{"\\( x^{\\circ}=" + params.x0_pos + " \\)"}</span> and <span className="direction-ltr inline-block">{"\\( x^{\\circ}=" + params.x0_neg + " \\)"}</span> respectively, using the Newton-Raphson method. Perform at least five iterations for each of the roots. Then find the other two negative roots.
                                </div>
                                <div className="grid grid-cols-2 gap-4 mt-8" dir="ltr">
                                    <div><label className="text-[10px] font-black text-slate-400 block text-center mb-1">One Positive Root (NR)</label>
                                    <input type="number" step="any" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900 shadow-sm outline-none" onChange={e => setAns({...ans, q3p: e.target.value})} value={ans.q3p||''} /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 block text-center mb-1">Negative Root (NR)</label>
                                    <input type="number" step="any" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900 shadow-sm outline-none" onChange={e => setAns({...ans, q3n: e.target.value})} value={ans.q3n||''} /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 block text-center mb-1">Other Negative Root (1)</label>
                                    <input type="number" step="any" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900 shadow-sm outline-none" onChange={e => setAns({...ans, q3o1: e.target.value})} value={ans.q3o1||''} /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 block text-center mb-1">Other Negative Root (2)</label>
                                    <input type="number" step="any" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900 shadow-sm outline-none" onChange={e => setAns({...ans, q3o2: e.target.value})} value={ans.q3o2||''} /></div>
                                </div>
                                <div className="flex gap-4 mt-12">
                                    <button onClick={() => setStep('q2')} className="flex-1 bg-slate-100 py-4 rounded-3xl font-bold text-slate-400">Back</button>
                                    <button onClick={() => !isNextLocked() && setStep('upload')} disabled={isNextLocked()} className="flex-[2] bg-blue-900 text-white py-4 rounded-3xl font-black shadow-lg disabled:opacity-20 transition-all">Submit Final</button>
                                </div>
                            </div>
                        )}

                        {step === 'upload' && (
                            <div className="p-10 text-center animate-in zoom-in duration-500">
                                <h3 className="text-xl font-black mb-10 text-blue-900 underline decoration-blue-100 italic">ارفق ملف الحل الكامل (PDF)</h3>
                                <div className="border-4 border-dashed p-14 rounded-[4rem] bg-slate-50 mb-10 border-blue-50 flex flex-col items-center group hover:border-blue-300 transition-colors cursor-pointer">
                                    <input type="file" accept="application/pdf" id="f_pdf" className="hidden" onChange={e => {
                                        const file = e.target.files[0];
                                        if(file && file.size <= 8*1024*1024) {
                                            const r = new FileReader(); r.onload = () => setFullFile(r.result.split(',')[1]); r.readAsDataURL(file);
                                        }
                                    }} />
                                    <label htmlFor="f_pdf" className="cursor-pointer">
                                        <div className="text-8xl mb-4 transition-transform hover:scale-110">📄</div>
                                        <p className="font-black text-slate-600 mb-2">{fullFile ? "✅ تم اختيار الملف بنجاح" : "اضغط لاختيار ملف PDF"}</p>
                                        <p className="text-[11px] text-slate-400 font-bold italic tracking-tighter">يجب أن يضم الملف حل جميع الأسئلة الثلاثة يدوياً</p>
                                    </label>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setStep('q3')} className="flex-1 bg-slate-100 py-5 rounded-[2rem] font-black text-slate-400">رجوع</button>
                                    <button onClick={submit} disabled={loading || (!fullFile && !localStorage.getItem('hw5_v3_submitted'))} className="flex-[2] bg-green-600 text-white py-5 rounded-[2rem] font-black text-2xl shadow-xl disabled:opacity-30 active:scale-95 transition-all">
                                        {loading ? "جاري الإرسال..." : "تأكيد الإرسال والنهائي"}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="mt-8 text-center text-slate-400 text-[8px] font-bold uppercase tracking-widest italic select-none">Numerical Analysis HW5 Portal - Tikrit 2026</div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
