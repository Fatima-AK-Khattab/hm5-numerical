<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة تكريت - نظام الواجبات الذكي HW5</title>
    
    <!-- تحميل المكتبات الأساسية -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- إعداد MathJax للرموز الرياضية -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .main-card { background: white; border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }
        .no-select { user-select: none; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .math-box { font-family: serif; font-size: 1.25rem; color: #1e3a8a; background: #f8fafc; padding: 1.5rem; border-radius: 1.5rem; border-right: 8px solid #1e3a8a; direction: ltr; text-align: center; margin: 15px 0; }
        .step-indicator { height: 8px; border-radius: 10px; background: #e5e7eb; position: relative; overflow: hidden; }
        .step-fill { height: 100%; background: #1e3a8a; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ضعي رابط Web App URL الخاص بكِ هنا ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyc6_zL7-O4uaSO7u1LNtwaDRvm_qaleaM0oDVSmmRlWAIbpH3tHfVOqBrmiUIfvAYo/exec";

        function App() {
            // محرك استعادة البيانات لضمان عدم الضياع
            const [step, setStep] = useState(() => localStorage.getItem('tikrit_hw5_step') || 'register');
            const [studentInfo, setStudentInfo] = useState(() => JSON.parse(localStorage.getItem('tikrit_hw5_info')) || { name: '', studyType: 'صباحي A' });
            const [ans, setAns] = useState(() => JSON.parse(localStorage.getItem('tikrit_hw5_ans')) || {});
            const [fullFile, setFullFile] = useState(null);
            const [loading, setLoading] = useState(false);
            const [submittedOnce, setSubmittedOnce] = useState(() => localStorage.getItem('tikrit_hw5_submitted') === 'true');

            // حفظ كل خطوة يقوم بها الطالب تلقائياً
            useEffect(() => {
                localStorage.setItem('tikrit_hw5_step', step);
                localStorage.setItem('tikrit_hw5_info', JSON.stringify(studentInfo));
                localStorage.setItem('tikrit_hw5_ans', JSON.stringify(ans));
            }, [step, studentInfo, ans]);

            // تحديث عرض المعادلات عند تغيير الصفحات
            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise();
                }
            }, [step, studentInfo.name]);

            // مصفوفة الحالات العشر المحددة (ثابتة لنفس الاسم)
            const params = useMemo(() => {
                if (!studentInfo.name || studentInfo.name.trim().length < 5) return { x: 1.5, h: 0.5, x0_p: 5, x0_n: -5 };
                const cleanName = studentInfo.name.replace(/\s+/g, "");
                const seed = cleanName.split("").reduce((acc, char) => acc + char.charCodeAt(0), 0);
                
                const q1_cases = [
                    {x: 0.5, h: 0.5}, {x: 1, h: 0.5}, {x: 1, h: 1}, 
                    {x: 1.5, h: 0.5}, {x: 1.5, h: 0.5}, {x: 2, h: 1}, 
                    {x: 2.5, h: 1.5}, {x: 3, h: 1}, {x: 4, h: 1}, {x: 4, h: 2}
                ];
                const selected = q1_cases[seed % q1_cases.length];
                return { 
                    x: selected.x, 
                    h: selected.h, 
                    x0_p: (seed % 5) + 1, 
                    x0_n: -((seed % 5) + 1) 
                };
            }, [studentInfo.name]);

            // محرك التصحيح الرياضي الداخلي
            const calculateModel = () => {
                const f = (x, y) => x*x + y*y;
                const h = params.h;
                const steps = Math.round(params.x / h);
                
                // 1. Euler
                let ye = 1; for(let i=0; i<steps; i++) ye += h * f(i*h, ye);
                // 2. Modified Euler
                let ym = 1; for(let i=0; i<steps; i++) {
                    let k1 = f(i*h, ym);
                    ym += (h/2) * (k1 + f((i+1)*h, ym + h*k1));
                }
                // 3. RK4
                let yr = 1; for(let i=0; i<steps; i++) {
                    let cx = i*h, k1 = h*f(cx,yr), k2 = h*f(cx+h/2,yr+k1/2), k3 = h*f(cx+h/2,yr+k2/2), k4 = h*f(cx+h,yr+k3);
                    yr += (k1 + 2*k2 + 2*k3 + k4)/6;
                }

                const solveNR = (type, start) => {
                    let x = start;
                    const f2 = (x) => Math.pow(x,4)-4*Math.pow(x,3)-7*x*x+34*x-24;
                    const df2 = (x) => 4*Math.pow(x,3)-12*x*x-14*x+34;
                    const f3 = (x) => Math.pow(x,4)+5*Math.pow(x,3)-10*x*x-80*x-96;
                    const df3 = (x) => 4*Math.pow(x,3)+15*x*x-20*x-80;
                    const func = (type===2)?f2:f3; const dfunc = (type===2)?df2:df3;
                    for(let i=0; i<15; i++) x = x - func(x)/dfunc(x);
                    return x;
                };

                return {
                    q1: { euler: ye, mod: ym, rk: yr },
                    q2: { p: solveNR(2, params.x0_p), n: solveNR(2, params.x0_n) },
                    q3: { p: solveNR(3, params.x0_p), n: solveNR(3, params.x0_n) }
                };
            };

            const calculateGrade = () => {
                const model = calculateModel();
                let score = 0;
                const check = (s, m) => Math.trunc(Math.abs(parseFloat(s||0))) === Math.trunc(Math.abs(m));

                if(check(ans.q1a, model.q1.euler)) score += 1;
                if(check(ans.q1b, model.q1.mod)) score += 1;
                if(check(ans.q1c, model.q1.rk)) score += 2;

                if(check(ans.q2p, model.q2.p)) score += 1.5;
                if(check(ans.q2n, model.q2.n)) score += 1.5;

                if(check(ans.q3p, model.q3.p)) score += 1.5;
                if(check(ans.q3n, model.q3.n)) score += 1.5;

                return { grade: score.toFixed(2), model };
            };

            const submit = async () => {
                if(!fullFile && !submittedOnce) return alert("يرجى رفع ملف الحل أولاً");
                setLoading(true);
                const { grade, model } = calculateGrade();
                const payload = { 
                    name: studentInfo.name, studyType: studentInfo.studyType, grade, params, ans, 
                    modelAnswers: model, fullFile, time: new Date().toLocaleString('ar-IQ') 
                };
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    localStorage.setItem('tikrit_hw5_submitted', 'true');
                    setSubmittedOnce(true);
                    setStep('success');
                } catch (e) { alert("حدث خطأ في الشبكة، يرجى المحاولة لاحقاً"); } finally { setLoading(false); }
            };

            const isNextDisabled = () => {
                if(step === 'register') return studentInfo.name.trim().split(/\s+/).length < 3;
                if(step === 'q1') return !ans.q1a || !ans.q1b || !ans.q1c;
                if(step === 'q2') return !ans.q2p || !ans.q2neg;
                if(step === 'q3') return !ans.q3p || !ans.q3neg;
                return false;
            };

            const getProgress = () => {
                const map = { register: 0, q1: 25, q2: 50, q3: 75, upload: 100 };
                return map[step] || 0;
            };

            return (
                <div className="min-h-screen py-10 px-4 flex flex-col items-center">
                    <div className="w-full max-w-2xl main-card overflow-hidden border-t-[16px] border-blue-900 transition-all no-select">
                        
                        {/* Progress Bar */}
                        {step !== 'register' && step !== 'success' && (
                            <div className="p-6 bg-slate-50 border-b flex flex-col gap-2">
                                <div className="flex justify-between text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                    <span>Task Progress</span><span>{getProgress()}%</span>
                                </div>
                                <div className="step-indicator"><div className="step-fill" style={{ width: `${getProgress()}%` }}></div></div>
                            </div>
                        )}

                        <div className="p-6 bg-white border-b flex justify-between items-center">
                            <div className="text-right">
                                <h1 className="text-xl font-black text-blue-900 leading-tight">جامعة تكريت - هندسة مدنية</h1>
                                <p className="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Numerical Analysis - HW5</p>
                            </div>
                            <div className="bg-blue-900 text-white px-3 py-1 rounded-xl font-black text-xs">2026</div>
                        </div>

                        {step === 'register' && (
                            <div className="p-10 text-right animate-in fade-in duration-500">
                                <h2 className="text-xl font-black mb-8 border-r-8 border-blue-600 pr-3">بيانات الطالب</h2>
                                {submittedOnce && <p className="bg-yellow-50 text-yellow-700 p-4 rounded-3xl mb-6 text-xs font-bold border border-yellow-100">لقد قمت بالتسليم مسبقاً، يمكنك الدخول لتعديل إجاباتك.</p>}
                                <input type="text" placeholder="الاسم الثلاثي باللغة العربية" className="w-full p-4 border-2 rounded-3xl mb-4 outline-none focus:border-blue-900" onChange={e => setStudentInfo({...studentInfo, name: e.target.value})} value={studentInfo.name} />
                                <select className="w-full p-4 border-2 rounded-3xl mb-10 bg-white font-bold" onChange={e => setStudentInfo({...studentInfo, studyType: e.target.value})} value={studentInfo.studyType}>
                                    <option>صباحي A</option><option>صباحي B</option><option>صباحي C</option><option>فصلي</option><option>مسائي</option>
                                </select>
                                <button onClick={() => !isNextDisabled() && setStep('q1')} disabled={isNextDisabled()} className="w-full bg-blue-900 text-white font-black py-5 rounded-3xl shadow-xl disabled:opacity-20 text-xl transition-all">دخول للواجب</button>
                            </div>
                        )}

                        {step === 'q1' && (
                            <div className="p-8 text-right animate-in slide-in-from-left">
                                <h3 className="font-black text-blue-900 mb-6 border-b pb-2 flex justify-between"><span>السؤال الأول</span><span className="text-slate-400 text-xs">1 / 3</span></h3>
                                <div className="math-box">
                                    Q1: If {"\\( (\\frac{dy}{dx}=x^{2}+y^{2}) \\)"} and {"\\( [y(0)=1] \\)"} find (y) at {"\\( [x=" + params.x + "] \\)"} and {"\\( [h=" + params.h + "] \\)"}, by using:
                                </div>
                                <div className="space-y-4" dir="ltr">
                                    {['a- Euler Method', 'b- Modified Euler Method', 'c- Runge-Kutta Method'].map((m, i) => (
                                        <div key={i}>
                                            <label className="text-[10px] font-black text-slate-400 block mb-1 uppercase">{m}</label>
                                            <input type="number" step="any" placeholder="Final y value..." className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, ['q1'+['a','b','c'][i]]: e.target.value})} value={ans['q1'+['a','b','c'][i]]||''} />
                                        </div>
                                    ))}
                                </div>
                                <div className="flex gap-4 mt-12">
                                    <button onClick={() => setStep('register')} className="flex-1 bg-slate-100 py-4 rounded-3xl font-black text-slate-400">رجوع</button>
                                    <button onClick={() => !isNextDisabled() && setStep('q2')} disabled={isNextDisabled()} className="flex-[2] bg-blue-900 text-white py-4 rounded-3xl font-black shadow-lg disabled:opacity-20 transition-all">التالي</button>
                                </div>
                            </div>
                        )}

                        {step === 'q2' && (
                            <div className="p-8 text-right animate-in slide-in-from-left">
                                <h3 className="font-black text-blue-900 mb-6 border-b pb-2 flex justify-between"><span>السؤال الثاني</span><span className="text-slate-400 text-xs">2 / 3</span></h3>
                                <div className="math-box text-sm">
                                    Q2: {"\\( x^{4}-4x^{3}-7x^{2}+34x-24=0 \\)"}. Approximate one positive and one negative root starting with {"\\( x^{\\circ}=" + params.x0_p + " \\)"} and {"\\( x^{\\circ}=" + params.x0_n + " \\)"} using Newton-Raphson.
                                </div>
                                <div className="grid grid-cols-2 gap-4" dir="ltr">
                                    <div><label className="text-[10px] font-black text-slate-400 block text-center mb-1">Positive Root</label>
                                    <input type="number" step="any" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, q2p: e.target.value})} value={ans.q2p||''} /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 block text-center mb-1">Negative Root</label>
                                    <input type="number" step="any" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, q2neg: e.target.value})} value={ans.q2neg||''} /></div>
                                </div>
                                <div className="flex gap-4 mt-12">
                                    <button onClick={() => setStep('q1')} className="flex-1 bg-slate-100 py-4 rounded-3xl font-black text-slate-400">السابق</button>
                                    <button onClick={() => !isLocked() && setStep('q3')} disabled={isLocked()} className="flex-[2] bg-blue-900 text-white py-4 rounded-3xl font-black shadow-lg disabled:opacity-20 transition-all">التالي</button>
                                </div>
                            </div>
                        )}

                        {step === 'q3' && (
                            <div className="p-8 text-right animate-in slide-in-from-left">
                                <h3 className="font-black text-blue-900 mb-6 border-b pb-2 flex justify-between"><span>السؤال الثالث</span><span className="text-slate-400 text-xs">3 / 3</span></h3>
                                <div className="math-box text-sm">
                                    Q3: {"\\( x^{4}+5x^{3}-10x^{2}-80x-96=0 \\)"}. Approximate one positive and one negative root starting with {"\\( x^{\\circ}=" + params.x0_p + " \\)"} and {"\\( x^{\\circ}=" + params.x0_n + " \\)"} using Newton-Raphson.
                                </div>
                                <div className="grid grid-cols-2 gap-4" dir="ltr">
                                    <div><label className="text-[10px] font-black text-slate-400 block text-center mb-1">Positive Root</label>
                                    <input type="number" step="any" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, q3p: e.target.value})} value={ans.q3p||''} /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 block text-center mb-1">Negative Root</label>
                                    <input type="number" step="any" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, q3neg: e.target.value})} value={ans.q3neg||''} /></div>
                                </div>
                                <div className="flex gap-4 mt-12">
                                    <button onClick={() => setStep('q2')} className="flex-1 bg-slate-100 py-4 rounded-3xl font-black text-slate-400">السابق</button>
                                    <button onClick={() => !isLocked() && setStep('upload')} disabled={isLocked()} className="flex-[2] bg-blue-900 text-white py-4 rounded-3xl font-black shadow-lg disabled:opacity-20 transition-all">الرفع النهائي</button>
                                </div>
                            </div>
                        )}

                        {step === 'upload' && (
                            <div className="p-10 text-center animate-in zoom-in duration-500">
                                <h3 className="text-xl font-black mb-10 text-blue-900 underline decoration-blue-100 italic">رفع ملف الحل النهائي (PDF)</h3>
                                <div className="border-4 border-dashed p-14 rounded-[3.5rem] bg-slate-50 mb-10 border-blue-50 flex flex-col items-center cursor-pointer">
                                    <input type="file" accept="application/pdf" id="f" className="hidden" onChange={e => {
                                        const file = e.target.files[0];
                                        if(file && file.size <= 8*1024*1024) {
                                            const r = new FileReader(); r.onload = () => setFullFile(r.result.split(',')[1]); r.readAsDataURL(file);
                                        }
                                    }} />
                                    <label htmlFor="f" className="cursor-pointer">
                                        <div className="text-7xl mb-4 group-hover:scale-110 transition-transform tracking-widest">📄</div>
                                        <p className="font-black text-slate-600 mb-2">{fullFile ? "✅ تم اختيار الملف" : "اضغط لاختيار ملف PDF"}</p>
                                        {submittedOnce && <p className="text-[10px] text-blue-500 font-bold italic">لا يحتاج إعادة رفع الملف إذا لم تغيره</p>}
                                    </label>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setStep('q3')} className="flex-1 bg-slate-100 py-5 rounded-3xl font-black text-slate-400">رجوع</button>
                                    <button onClick={submit} disabled={loading || (!fullFile && !submittedOnce)} className="flex-[2] bg-green-600 text-white py-5 rounded-3xl font-black text-2xl shadow-xl disabled:opacity-30 active:scale-95 transition-all">
                                        {loading ? "جاري الإرسال..." : "تأكيد الإرسال والنهائي"}
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 'success' && (
                            <div className="p-20 text-center bg-white shadow-inner animate-in fade-in duration-700">
                                <div className="text-8xl mb-8 animate-bounce">🎓</div>
                                <h2 className="text-2xl font-black mb-10 text-blue-900 leading-loose">
                                    لقد تم استلام اجابتك بنجاح يا <br/>
                                    <span className="text-blue-700 underline underline-offset-8 decoration-2">{studentInfo.name}</span> <br/>
                                    شكراً لك على المشاركة
                                </h2>
                                <div className="space-y-4">
                                    <div className="p-5 border-4 border-double border-blue-900 rounded-[2.5rem] text-blue-900 font-black text-sm inline-block">جامعة تكريت - قسم الهندسة المدنية</div>
                                    <br/>
                                    <button onClick={() => setStep('q1')} className="text-blue-600 font-black text-sm hover:underline mt-6">
                                        تعديل الواجب (إعادة إرسال)
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="mt-8 text-center text-slate-400 text-[8px] font-bold uppercase tracking-widest italic select-none">Numerical Analysis - HW5 Portal - Tikrit 2026</div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
