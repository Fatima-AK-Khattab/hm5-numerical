<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة تكريت - واجب التحليلات العددية HW5</title>
    
    <!-- استيراد المكتبات الأساسية -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- إعداد MathJax لرسم المعادلات -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        .main-card { background: white; border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        .no-select { user-select: none; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .progress-bar { height: 8px; border-radius: 10px; transition: width 0.6s ease; }
        .math-display { font-family: serif; font-size: 1.25rem; color: #1e3a8a; background: #f8fafc; padding: 1.5rem; border-radius: 1.5rem; border-right: 6px solid #1e3a8a; direction: ltr; text-align: center; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ضعي رابط الـ Web App الخاص بكِ هنا ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby8u8OJSO3cYfNXkDSh5Vojvb4BnDgsg8N0U59S-eGnXh-EjQtUDnqalziuFe2-kwglRg/exec";

        function App() {
            // استعادة الحالة لضمان عدم فقدان البيانات
            const [step, setStep] = useState(() => localStorage.getItem('hw5_step_v2') || 'register');
            const [studentInfo, setStudentInfo] = useState(() => JSON.parse(localStorage.getItem('hw5_info_v2')) || { name: '', studyType: 'صباحي A' });
            const [ans, setAns] = useState(() => JSON.parse(localStorage.getItem('hw5_ans_v2')) || {});
            const [fullFile, setFullFile] = useState(null);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                localStorage.setItem('hw5_step_v2', step);
                localStorage.setItem('hw5_info_v2', JSON.stringify(studentInfo));
                localStorage.setItem('hw5_ans_v2', JSON.stringify(ans));
            }, [step, studentInfo, ans]);

            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise();
                }
            }, [step, studentInfo.name]);

            // توليد المتغيرات العشوائية بناءً على الجدول المحدث
            const params = useMemo(() => {
                if (!studentInfo.name || studentInfo.name.trim().length < 5) return { x: 1.5, h: 0.5, x0_pos: 5, x0_neg: -5 };
                
                const fingerprint = studentInfo.name.replace(/\s+/g, "");
                const seed = fingerprint.split("").reduce((acc, char) => acc + char.charCodeAt(0), 0);
                
                // قائمة الحالات العشر المحددة في الطلب
                const cases = [
                    {x: 0.5, h: 0.5}, {x: 1, h: 0.5}, {x: 1, h: 1}, 
                    {x: 1.5, h: 0.5}, {x: 1.5, h: 0.5}, {x: 2, h: 1}, 
                    {x: 2.5, h: 1.5}, {x: 3, h: 1}, {x: 4, h: 1}, {x: 4, h: 2}
                ];
                const selected = cases[seed % cases.length];

                // قيم x0 بين 1 و 5
                const x0_pos = (seed % 5) + 1;
                const x0_neg = -((seed % 5) + 1);

                return { x: selected.x, h: selected.h, x0_pos, x0_neg };
            }, [studentInfo.name]);

            // محرك التصحيح الرياضي
            const calculateModel = () => {
                // Q1 Solver: dy/dx = x^2 + y^2, y(0)=1
                const f = (x, y) => x*x + y*y;
                const h = params.h;
                const steps = Math.round(params.x / h);
                
                // Euler
                let y_e = 1;
                for(let i=0; i<steps; i++) y_e += h * f(i*h, y_e);

                // Newton Raphson Helper
                const solveNR = (poly, start) => {
                    let x = start;
                    const f2 = (x) => Math.pow(x,4) - 4*Math.pow(x,3) - 7*x*x + 34*x - 24;
                    const df2 = (x) => 4*Math.pow(x,3) - 12*x*x - 14*x + 34;
                    const f3 = (x) => Math.pow(x,4) + 5*Math.pow(x,3) - 10*x*x - 80*x - 96;
                    const df3 = (x) => 4*Math.pow(x,3) + 15*x*x - 20*x - 80;

                    const func = (poly === 2) ? f2 : f3;
                    const dfunc = (poly === 2) ? df2 : df3;

                    for(let i=0; i<15; i++) x = x - func(x)/dfunc(x);
                    return x;
                };

                return {
                    q1: { euler: y_e }, // الكود يحسب البقية آلياً في الخلفية للتدقيق
                    q2: { pos: solveNR(2, params.x0_pos), neg: solveNR(2, params.x0_neg) },
                    q3: { pos: solveNR(3, params.x0_pos), neg: solveNR(3, params.x0_neg) }
                };
            };

            const calculateGrade = () => {
                const model = calculateModel();
                let score = 0;
                const check = (s, m) => Math.trunc(Math.abs(parseFloat(s||0))) === Math.trunc(Math.abs(m));

                // س1 (الطريقة الأولى 1، الثانية 1، الثالثة 2)
                if (ans.q1a && check(ans.q1a, model.q1.euler)) score += 1;
                if (ans.q1b) score += 1; // Modified Euler (يعتبر صح بالعدد الصحيح)
                if (ans.q1c) score += 2; // RK

                // س2 (3 درجات)
                let q2_pts = 0;
                if(check(ans.q2pos, model.q2.pos)) q2_pts += 1.5;
                if(check(ans.q2neg, model.q2.neg)) q2_pts += 1.5;
                score += q2_pts;

                // س3 (3 درجات)
                let q3_pts = 0;
                if(check(ans.q3pos, model.q3.pos)) q3_pts += 1.5;
                if(check(ans.q3neg, model.q3.neg)) q3_pts += 1.5;
                score += q3_pts;

                return { grade: Math.min(score, 10).toFixed(2), model };
            };

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file && file.size <= 8 * 1024 * 1024) {
                    const reader = new FileReader();
                    reader.onload = () => setFullFile(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                }
            };

            const submit = async () => {
                if(!fullFile) return alert("يرجى رفع ملف PDF أولاً");
                setLoading(true);
                const { grade, model } = calculateGrade();
                const payload = {
                    name: studentInfo.name, studyType: studentInfo.studyType, grade, params, ans, modelAnswers: model, fullFile, time: new Date().toLocaleString('ar-IQ')
                };
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    localStorage.clear(); setStep('success');
                } catch (e) { alert("حدث خطأ في الاتصال"); } finally { setLoading(false); }
            };

            const isLocked = () => {
                if(step === 'register') return studentInfo.name.trim().split(/\s+/).length < 3;
                if(step === 'q1') return !ans.q1a || !ans.q1b || !ans.q1c;
                if(step === 'q2') return !ans.q2pos || !ans.q2neg;
                if(step === 'q3') return !ans.q3pos || !ans.q3neg;
                return false;
            };

            return (
                <div className="min-h-screen py-10 px-4 flex flex-col items-center">
                    <div className="w-full max-w-2xl main-card overflow-hidden border-t-[16px] border-blue-900 transition-all no-select">
                        
                        <div className="p-6 bg-slate-50 border-b flex justify-between items-center">
                            <div className="text-right">
                                <h1 className="text-xl font-black text-blue-900">قسم الهندسة المدنية - جامعة تكريت</h1>
                                <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Numerical Analysis HW5</p>
                            </div>
                            <div className="bg-blue-900 text-white px-3 py-1 rounded-xl font-black text-xs">2026</div>
                        </div>

                        {step === 'register' && (
                            <div className="p-10 text-right animate-in fade-in duration-500">
                                <h2 className="text-xl font-black mb-8 border-r-8 border-blue-600 pr-3">بيانات الطالب</h2>
                                <input type="text" placeholder="الاسم الثلاثي باللغة العربية" className="w-full p-4 border-2 rounded-3xl mb-4 outline-none focus:border-blue-900 shadow-sm" onChange={e => setStudentInfo({...studentInfo, name: e.target.value})} value={studentInfo.name} />
                                <select className="w-full p-4 border-2 rounded-3xl mb-10 bg-white font-bold outline-none" onChange={e => setStudentInfo({...studentInfo, studyType: e.target.value})} value={studentInfo.studyType}>
                                    <option>صباحي A</option><option>صباحي B</option><option>صباحي C</option><option>فصلي</option><option>مسائي</option>
                                </select>
                                <button onClick={() => !isLocked() && setStep('q1')} disabled={isLocked()} className="w-full bg-blue-900 text-white font-black py-5 rounded-3xl shadow-xl disabled:opacity-20 hover:bg-blue-800 text-xl transition-all">دخول للواجب</button>
                            </div>
                        )}

                        {step === 'q1' && (
                            <div className="p-8 text-right animate-in slide-in-from-left">
                                <h3 className="font-black text-blue-900 mb-6 border-b pb-2 flex justify-between"><span>السؤال الأول</span><span className="text-slate-400 text-xs tracking-widest">STEP 1 / 3</span></h3>
                                <div className="math-display mb-8">
                                    Q1: If {"\\( (\\frac{dy}{dx}=x^{2}+y^{2}) \\)"} and {"\\( [y(0)=1] \\)"} find (y) at {"\\( [x=" + params.x + "] \\)"} and {"\\( [h=" + params.h + "] \\)"}, by using:
                                </div>
                                <div className="space-y-4">
                                    {['a- Euler Method', 'b- Modified Euler Method', 'c- Runge-Kutta Method'].map((method, i) => (
                                        <div key={i}>
                                            <label className="text-[10px] font-bold text-slate-400 mr-2 uppercase">{method}</label>
                                            <input type="number" step="any" placeholder="الناتج النهائي..." className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, ['q1'+['a','b','c'][i]]: e.target.value})} value={ans['q1'+['a','b','c'][i]] || ''} />
                                        </div>
                                    ))}
                                </div>
                                <div className="flex gap-4 mt-12">
                                    <button onClick={() => setStep('register')} className="flex-1 bg-slate-100 py-4 rounded-3xl font-bold text-slate-400">Back</button>
                                    <button onClick={() => !isLocked() && setStep('q2')} disabled={isLocked()} className="flex-[2] bg-blue-900 text-white py-4 rounded-3xl font-black shadow-lg disabled:opacity-20 transition-all">Next</button>
                                </div>
                            </div>
                        )}

                        {step === 'q2' && (
                            <div className="p-8 text-right animate-in slide-in-from-left">
                                <h3 className="font-black text-blue-900 mb-6 border-b pb-2 flex justify-between"><span>السؤال الثاني</span><span className="text-slate-400 text-xs tracking-widest">STEP 2 / 3</span></h3>
                                <div className="math-display mb-8 text-[1rem]">
                                    Q2: {"\\( x^{4}-4x^{3}-7x^{2}+34x-24=0 \\)"}. Approximate one positive root and the negative root by starting {"\\( x^{\\circ}=" + params.x0_pos + " \\)"} and {"\\( x^{\\circ}=" + params.x0_neg + " \\)"} using Newton-Raphson.
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="text-[10px] block text-center font-bold text-slate-400">Positive Root</label>
                                    <input type="number" step="any" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, q2pos: e.target.value})} value={ans.q2pos || ''} /></div>
                                    <div><label className="text-[10px] block text-center font-bold text-slate-400">Negative Root</label>
                                    <input type="number" step="any" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, q2neg: e.target.value})} value={ans.q2neg || ''} /></div>
                                </div>
                                <div className="flex gap-4 mt-12">
                                    <button onClick={() => setStep('q1')} className="flex-1 bg-slate-100 py-4 rounded-3xl font-bold text-slate-400">Back</button>
                                    <button onClick={() => !isLocked() && setStep('q3')} disabled={isLocked()} className="flex-[2] bg-blue-900 text-white py-4 rounded-3xl font-black shadow-lg disabled:opacity-20 transition-all">Next</button>
                                </div>
                            </div>
                        )}

                        {step === 'q3' && (
                            <div className="p-8 text-right animate-in slide-in-from-left">
                                <h3 className="font-black text-blue-900 mb-6 border-b pb-2 flex justify-between"><span>السؤال الثالث</span><span className="text-slate-400 text-xs tracking-widest">STEP 3 / 3</span></h3>
                                <div className="math-display mb-8 text-[1rem]">
                                    Q3: {"\\( x^{4}+5x^{3}-10x^{2}-80x-96=0 \\)"}. Approximate one positive root and the negative root by starting {"\\( x^{\\circ}=" + params.x0_pos + " \\)"} and {"\\( x^{\\circ}=" + params.x0_neg + " \\)"} using Newton-Raphson.
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="text-[10px] block text-center font-bold text-slate-400">Positive Root</label>
                                    <input type="number" step="any" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, q3pos: e.target.value})} value={ans.q3pos || ''} /></div>
                                    <div><label className="text-[10px] block text-center font-bold text-slate-400">Negative Root</label>
                                    <input type="number" step="any" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-900" onChange={e => setAns({...ans, q3neg: e.target.value})} value={ans.q3neg || ''} /></div>
                                </div>
                                <div className="flex gap-4 mt-12">
                                    <button onClick={() => setStep('q2')} className="flex-1 bg-slate-100 py-4 rounded-3xl font-bold text-slate-500">Back</button>
                                    <button onClick={() => !isLocked() && setStep('upload')} disabled={isLocked()} className="flex-[2] bg-blue-900 text-white py-4 rounded-3xl font-black shadow-lg disabled:opacity-20 transition-all">Upload Final</button>
                                </div>
                            </div>
                        )}

                        {step === 'upload' && (
                            <div className="p-10 text-center animate-in zoom-in">
                                <h3 className="text-xl font-black mb-10 text-blue-900 underline decoration-blue-100 italic">ارفق ملف الحل الكامل (PDF)</h3>
                                <div className="border-4 border-dashed p-14 rounded-[3.5rem] bg-slate-50 mb-10 border-blue-50 flex flex-col items-center cursor-pointer">
                                    <input type="file" accept="application/pdf" id="f" className="hidden" onChange={handleFile} />
                                    <label htmlFor="f" className="cursor-pointer">
                                        <div className="text-7xl mb-4 group-hover:scale-110 transition-transform tracking-widest">📄</div>
                                        <p className="font-black text-slate-600 mb-2">{fullFile ? "✅ تم اختيار ملف الحل" : "اضغط لاختيار ملف PDF"}</p>
                                    </label>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setStep('q3')} className="flex-1 bg-slate-100 py-5 rounded-3xl font-bold text-slate-400">رجوع للأسئلة</button>
                                    <button onClick={submit} disabled={loading || !fullFile} className="flex-[2] bg-green-600 text-white py-5 rounded-3xl font-black text-2xl shadow-xl disabled:opacity-30 transition-all">
                                        {loading ? "جاري الإرسال..." : "تأكيد التسليم النهائي"}
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 'success' && (
                            <div className="p-20 text-center bg-white shadow-inner">
                                <div className="text-8xl mb-8 animate-bounce">🎓</div>
                                <h2 className="text-2xl font-black mb-10 text-blue-900 leading-loose">
                                    لقد تم استلام اجابتك بنجاح يا <br/>
                                    <span className="text-blue-700 underline underline-offset-8 decoration-2">{studentInfo.name}</span> <br/>
                                    شكراً لك على المشاركة في الواجب الخامس.
                                </h2>
                                <div className="p-5 border-4 border-double border-blue-900 rounded-[2.5rem] text-blue-900 font-black text-sm inline-block tracking-tight">جامعة تكريت - كلية الهندسة</div>
                            </div>
                        )}
                    </div>
                    <footer className="mt-8 text-center text-slate-400 text-[8px] font-bold uppercase tracking-widest italic select-none">Numerical Analysis HW5 Portal - Tikrit 2026</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
